name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Website quality
    runs-on: ubuntu-latest
    env:
      VITE_BASE_PATH: /eidos-website/
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate brand assets
        run: npm run brand

      - name: Verify generated assets
        run: git diff --exit-code -- public/brand

      - name: Run quality gates
        run: npm run check

      - name: Upload review artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: eidos-website-${{ github.sha }}
          path: dist
          if-no-files-found: error
          retention-days: 7
